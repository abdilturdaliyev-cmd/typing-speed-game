<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="card">
        <h1>TypeSpeed</h1>

        <div class="settings-strip">
            <div class="setting-item">
                <label for="session-mode">Mode</label>
                <select id="session-mode" aria-label="Select session mode">
                    <option value="quote">Quote</option>
                    <option value="30s">30s</option>
                    <option value="60s">60s</option>
                </select>
            </div>

            <div class="setting-item" id="quote-category-wrap">
                <label for="quote-mode">Category</label>
                <select id="quote-mode" aria-label="Select quote category">
                    <option value="all">All</option>
                    <option value="coding">Coding</option>
                    <option value="motivational">Motivational</option>
                    <option value="general">General</option>
                </select>
            </div>

            <label class="setting-toggle" for="stop-on-error">
                <input type="checkbox" id="stop-on-error">
                <span>Stop on error</span>
            </label>

            <label class="setting-toggle" for="sound-enabled">
                <input type="checkbox" id="sound-enabled">
                <span>Sound</span>
                <span id="sound-state" class="toggle-state">Off</span>
            </label>
        </div>

        <div class="sentence-area">
            <div id="sentence-box">Click "Start" to reveal your sentence!</div>
            <div id="countdown-overlay" class="countdown-overlay hidden" aria-live="assertive"></div>
        </div>
        
        <textarea id="input-field" rows="2" disabled placeholder="Waiting for you..."></textarea>

        <div class="progress-wrap" aria-hidden="true">
            <div class="progress-track">
                <div id="progress-fill"></div>
                <div id="ghost-marker" class="hidden"></div>
            </div>
            <div class="progress-meta">
                <span id="ghost-legend">Ghost pace: your best run pace</span>
                <span>Best WPM: <strong id="best-inline-wpm">0</strong></span>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-badge">WPM <span id="wpm">0</span></div>
            <div class="stat-badge">Time <span id="time">0</span>s</div>
            <div class="stat-badge">Acc <span id="accuracy">100</span>%</div>
        </div>
        
        <div class="buttons">
            <button id="start-btn">Start</button>
            <button id="reset-btn">Restart</button>
        </div>

        <div id="results" class="results hidden" aria-live="polite">
            <h2>Results</h2>
            <p>Mode: <span id="final-mode">Quote</span></p>
            <p>WPM: <span id="final-wpm">0</span></p>
            <p>Accuracy: <span id="final-accuracy">100</span>%</p>
            <p>Time: <span id="final-time">0</span>s</p>
            <p class="results-subtitle">Best Scores</p>
            <p>Best WPM: <span id="best-wpm">0</span></p>
            <p>Best Accuracy: <span id="best-accuracy">0</span>%</p>
            <p>Best Time: <span id="best-time">--</span></p>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
