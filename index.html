<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="card">
        <h1>TypeSpeed</h1>

        <div class="mode-row">
            <label for="quote-mode">Quote Mode:</label>
            <select id="quote-mode" aria-label="Select quote category">
                <option value="all">All</option>
                <option value="coding">Coding</option>
                <option value="motivational">Motivational</option>
                <option value="general">General</option>
            </select>
        </div>

        <div class="sentence-area">
            <div id="sentence-box">Click "Start" to reveal your sentence!</div>
            <div id="countdown-overlay" class="countdown-overlay hidden" aria-live="assertive"></div>
        </div>
        
        <textarea id="input-field" rows="2" disabled placeholder="Waiting for you..."></textarea>

        <div class="progress-wrap" aria-hidden="true">
            <div class="progress-track">
                <div id="progress-fill"></div>
                <div id="ghost-marker" class="hidden"></div>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-badge">WPM <span id="wpm">0</span></div>
            <div class="stat-badge">Time <span id="time">0</span>s</div>
            <div class="stat-badge">Acc <span id="accuracy">100</span>%</div>
        </div>
        
        <div class="buttons">
            <button id="start-btn">Start</button>
            <button id="reset-btn">Restart</button>
        </div>

        <div id="results" class="results hidden" aria-live="polite">
            <h2>Results</h2>
            <p>WPM: <span id="final-wpm">0</span></p>
            <p>Accuracy: <span id="final-accuracy">100</span>%</p>
            <p>Time: <span id="final-time">0</span>s</p>
            <p class="results-subtitle">Best Scores</p>
            <p>Best WPM: <span id="best-wpm">0</span></p>
            <p>Best Accuracy: <span id="best-accuracy">0</span>%</p>
            <p>Best Time: <span id="best-time">--</span></p>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
